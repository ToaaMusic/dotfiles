# https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/yazi-default.toml
# https://yazi-rs.github.io/docs/configuration/yazi

[mgr]
show_hidden = true
ratio = [1, 2, 4] # 至少一列，分母可变

sort_translit = true
linemode = "size"

scrolloff = 200
title_format = ""

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]

[preview]
wrap = "yes"
